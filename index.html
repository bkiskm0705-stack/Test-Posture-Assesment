<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Aequum — プロフェッショナル向け姿勢評価アプリケーション。スマホ1台で姿勢アライメントを定量的に評価・追跡。">
  <meta name="theme-color" content="#0D0D1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Aequum — 姿勢評価アプリ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- ===== App Shell ===== -->
  <div id="app">
    <!-- Header Bar -->
    <header id="app-header">
      <button id="btn-back" class="header-btn" aria-label="戻る" style="display:none;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h1 id="header-title"><span style="font-size:0.45em; font-weight:400; opacity:0.5; margin-right:6px; vertical-align:middle;">ver1.1</span>Aequum</h1>
      <div id="header-actions"></div>
    </header>

    <!-- ===== Page: クライアント一覧 ===== -->
    <section id="page-clients" class="page active">
      <div class="search-bar">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="client-search" placeholder="クライアントを検索..." autocomplete="off">
      </div>
      <div id="client-list" class="card-list"></div>
      <div id="empty-state" class="empty-state" style="display:none;">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <p>クライアントが登録されていません</p>
        <p class="sub">下のボタンから最初のクライアントを追加しましょう</p>
      </div>
      <button id="fab-add-client" class="fab" aria-label="クライアント追加">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </section>

    <!-- ===== Page: 新規クライアント登録 ===== -->
    <section id="page-new-client" class="page">
      <form id="form-new-client" class="form-container" novalidate>
        <div class="form-group">
          <label for="input-name">氏名 <span class="required">*</span></label>
          <input type="text" id="input-name" required placeholder="山田 太郎">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="input-dob">生年月日</label>
            <input type="date" id="input-dob">
          </div>
          <div class="form-group">
            <label for="input-gender">性別</label>
            <select id="input-gender">
              <option value="">選択</option>
              <option value="male">男性</option>
              <option value="female">女性</option>
              <option value="other">その他</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="input-height">身長 (cm)</label>
          <input type="number" id="input-height" min="50" max="250" step="0.1" placeholder="170.5">
        </div>
        <div class="form-group">
          <label for="input-history">既往歴</label>
          <textarea id="input-history" rows="3" placeholder="手術歴、診断名など"></textarea>
        </div>
        <div class="form-group">
          <label for="input-complaint">主訴</label>
          <textarea id="input-complaint" rows="3" placeholder="来院理由・気になる症状"></textarea>
        </div>
        <button type="submit" id="btn-save-client" class="btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          登録する
        </button>
      </form>
    </section>

    <!-- ===== Page: クライアント詳細 ===== -->
    <section id="page-client-detail" class="page">
      <div id="client-profile" class="profile-card"></div>
      <div class="section-header">
        <h2>評価セッション</h2>
        <button id="btn-new-session" class="btn-accent">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新規評価
        </button>
      </div>
      <div id="session-timeline" class="timeline"></div>
      <div id="session-empty" class="empty-state" style="display:none;">
        <p>まだ評価がありません</p>
        <p class="sub">「新規評価」から初回の撮影を行いましょう</p>
      </div>
    </section>

    <!-- ===== Page: 撮影画面 ===== -->
    <section id="page-capture" class="page">
      <div id="camera-container">
        <video id="camera-preview" autoplay playsinline></video>
        <canvas id="grid-overlay"></canvas>
        <div id="level-indicator">
          <div id="level-bubble"></div>
          <span id="level-value">0.0°</span>
        </div>
        <div id="capture-controls">
          <label id="btn-upload-photo" class="capture-side-btn" aria-label="写真をアップロード">
            <input type="file" accept="image/*" id="photo-upload-input" style="display:none;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          </label>
          <button id="btn-capture" class="capture-btn" disabled aria-label="撮影">
            <div class="capture-ring"></div>
          </button>
          <div class="capture-side-btn" style="visibility:hidden;"></div>
        </div>
      </div>
    </section>

    <!-- ===== Page: 解析画面 ===== -->
    <section id="page-analyze" class="page">
      <div id="analyze-container">
        <canvas id="analyze-canvas"></canvas>
        <div id="landmark-info-panel" class="info-panel">
          <div id="landmark-list"></div>
        </div>
      </div>
      <div id="analyze-toolbar">
        <button id="btn-auto-detect" class="tool-btn" title="自動判定">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/><circle cx="12" cy="12" r="4"/></svg>
          自動判定
        </button>
        <button id="btn-toggle-plumb" class="tool-btn active" title="基準線">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="22"/><circle cx="12" cy="22" r="2" fill="currentColor"/></svg>
          基準線
        </button>
        <button id="btn-toggle-grid" class="tool-btn" title="グリッド">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="3" x2="3" y2="21"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="21" y1="3" x2="21" y2="21"/><line x1="3" y1="3" x2="21" y2="3"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="3" y1="21" x2="21" y2="21"/></svg>
          グリッド
        </button>
        <button id="btn-toggle-info" class="tool-btn active" title="詳細表示">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          詳細
        </button>
        <button id="btn-add-landmark" class="tool-btn" title="ランドマーク追加">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/></svg>
          追加
        </button>
        <button id="btn-save-analysis" class="tool-btn save" title="保存">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          保存
        </button>
      </div>
      <!-- Disclaimer -->
      <div id="disclaimer-banner" class="disclaimer">
        ⚠️ 理想的なアライメントからの逸脱＝即座に障害の原因、ではありません
      </div>
    </section>

    <!-- ===== Page: 比較画面 ===== -->
    <section id="page-compare" class="page">
      <div id="compare-mode-tabs" class="tab-bar">
        <button class="tab active" data-mode="side-by-side">並列比較</button>
        <button class="tab" data-mode="onion-skin">オニオンスキン</button>
        <button class="tab" data-mode="trend">トレンド</button>
      </div>
      <div id="compare-content">
        <!-- Side-by-side -->
        <div id="compare-side" class="compare-view active">
          <div class="compare-panel" id="compare-before"></div>
          <div class="compare-panel" id="compare-after"></div>
        </div>
        <!-- Onion skin -->
        <div id="compare-onion" class="compare-view">
          <canvas id="onion-canvas"></canvas>
          <input type="range" id="onion-slider" min="0" max="100" value="50" class="slider">
          <div class="slider-labels">
            <span>Before</span>
            <span>After</span>
          </div>
        </div>
        <!-- Trend graph -->
        <div id="compare-trend" class="compare-view">
          <div id="trend-controls">
            <select id="trend-landmark-select"></select>
          </div>
          <canvas id="trend-chart"></canvas>
        </div>
      </div>
      <div id="compare-session-selector">
        <label>セッション選択:</label>
        <select id="select-before"></select>
        <select id="select-after"></select>
      </div>
    </section>

    <!-- ===== Page: レポート画面 ===== -->
    <section id="page-report" class="page">
      <div id="report-content" class="report-container"></div>
      <div id="report-actions">
        <button id="btn-export-pdf" class="btn-primary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          PDFエクスポート
        </button>
        <button id="btn-share-report" class="btn-outline">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          共有
        </button>
      </div>
    </section>

    <!-- ===== Modal: ランドマーク選択 ===== -->
    <div id="modal-landmark" class="modal" style="display:none;">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <h3>ランドマークを選択</h3>
        <div id="landmark-picker" class="landmark-picker"></div>
        <button class="btn-outline modal-close">キャンセル</button>
      </div>
    </div>

    <!-- ===== Toast ===== -->
    <div id="toast" class="toast" style="display:none;"></div>
  </div>

  <script src="db.js"></script>
  <script src="analysis.js"></script>
  <script src="app.js"></script>
</body>
</html>
